<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280" font-family="'Georgia', 'Times New Roman', serif">
  <!-- Background -->
  <rect width="860" height="280" fill="#0f1117" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="140" x2="860" y2="140" stroke="#1e2330" stroke-width="1"/>

  <!-- ── NODE BOXES ── -->

  <!-- 1. Excel/CSV Data -->
  <rect x="24" y="60" width="128" height="60" rx="6" fill="#1a1f2e" stroke="#2e3a5c" stroke-width="1.5"/>
  <text x="88" y="84" text-anchor="middle" fill="#8ca0cc" font-size="10" letter-spacing="1" font-family="'Courier New', monospace">SOURCE</text>
  <text x="88" y="103" text-anchor="middle" fill="#e8edf8" font-size="13" font-weight="bold">Excel / CSV</text>

  <!-- Arrow 1→2 -->
  <line x1="154" y1="90" x2="196" y2="90" stroke="#2e3a5c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="196,85 206,90 196,95" fill="#2e3a5c"/>

  <!-- 2. BigQuery -->
  <rect x="208" y="60" width="128" height="60" rx="6" fill="#1a1f2e" stroke="#2e5c8a" stroke-width="1.5"/>
  <text x="272" y="84" text-anchor="middle" fill="#5a9fd4" font-size="10" letter-spacing="1" font-family="'Courier New', monospace">STORAGE</text>
  <text x="272" y="103" text-anchor="middle" fill="#e8edf8" font-size="13" font-weight="bold">BigQuery</text>

  <!-- Vertical line down from BigQuery -->
  <line x1="272" y1="122" x2="272" y2="172" stroke="#2e5c8a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="267,172 272,182 277,172" fill="#2e5c8a"/>

  <!-- Daily Aggregation box -->
  <rect x="208" y="184" width="128" height="52" rx="6" fill="#141820" stroke="#2e5c8a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="272" y="205" text-anchor="middle" fill="#5a9fd4" font-size="9.5" letter-spacing="0.5" font-family="'Courier New', monospace">TRANSFORM</text>
  <text x="272" y="224" text-anchor="middle" fill="#8ca0cc" font-size="11.5">Daily Aggregation</text>

  <!-- Arrow 2→3 -->
  <line x1="338" y1="90" x2="380" y2="90" stroke="#2e3a5c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="380,85 390,90 380,95" fill="#2e3a5c"/>

  <!-- 3. BQML ARIMA_PLUS -->
  <rect x="392" y="48" width="148" height="84" rx="6" fill="#1a1f2e" stroke="#4a7c59" stroke-width="1.8"/>
  <text x="466" y="72" text-anchor="middle" fill="#6ab87e" font-size="10" letter-spacing="1" font-family="'Courier New', monospace">ML MODEL</text>
  <text x="466" y="94" text-anchor="middle" fill="#e8edf8" font-size="13" font-weight="bold">BQML ARIMA_PLUS</text>
  <text x="466" y="114" text-anchor="middle" fill="#6ab87e" font-size="10" font-family="'Courier New', monospace">5–15 min training</text>

  <!-- Vertical line down from BQML -->
  <line x1="466" y1="134" x2="466" y2="172" stroke="#4a7c59" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="461,172 466,182 471,172" fill="#4a7c59"/>

  <!-- Training box -->
  <rect x="392" y="184" width="148" height="52" rx="6" fill="#141820" stroke="#4a7c59" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="466" y="205" text-anchor="middle" fill="#6ab87e" font-size="9.5" letter-spacing="0.5" font-family="'Courier New', monospace">AUTO-DETECTS</text>
  <text x="466" y="224" text-anchor="middle" fill="#8ca0cc" font-size="11">Seasonality + Holidays</text>

  <!-- Arrow 3→4 -->
  <line x1="542" y1="90" x2="584" y2="90" stroke="#2e3a5c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="584,85 594,90 584,95" fill="#2e3a5c"/>

  <!-- 4. Forecasts -->
  <rect x="596" y="60" width="128" height="60" rx="6" fill="#1a1f2e" stroke="#7c5c9a" stroke-width="1.5"/>
  <text x="660" y="84" text-anchor="middle" fill="#a07cc8" font-size="10" letter-spacing="1" font-family="'Courier New', monospace">OUTPUT</text>
  <text x="660" y="103" text-anchor="middle" fill="#e8edf8" font-size="13" font-weight="bold">Forecasts</text>

  <!-- Arrow 4→5 -->
  <line x1="726" y1="90" x2="766" y2="90" stroke="#2e3a5c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="766,85 776,90 766,95" fill="#2e3a5c"/>

  <!-- 5. Looker Studio -->
  <rect x="778" y="60" width="60" height="60" rx="6" fill="#1a1f2e" stroke="#c0823a" stroke-width="1.5"/>
  <text x="808" y="84" text-anchor="middle" fill="#d4964e" font-size="8.5" letter-spacing="0.5" font-family="'Courier New', monospace">VISUALIZE</text>
  <text x="808" y="103" text-anchor="middle" fill="#e8edf8" font-size="10.5" font-weight="bold">Looker</text>

  <!-- Bottom label bar -->
  <rect x="24" y="250" width="814" height="1" fill="#1e2330"/>
  <text x="430" y="270" text-anchor="middle" fill="#3a4560" font-size="10" letter-spacing="2" font-family="'Courier New', monospace">BIGQUERY ML — RETAIL FORECASTING PIPELINE</text>
</svg>
