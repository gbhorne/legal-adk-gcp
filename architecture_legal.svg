<text font-size="13" font-weight="bold" fill="#444441" x="170" y="588" text-anchor="middle">Cloud Storage (GCS)</text>
<text font-size="10" fill="#5F5E5A" x="170" y="604" text-anchor="middle">legal-adk-corpus-raw  |  legal-adk-corpus-processed</text>

<!-- GCS to ingestion -->
<line x1="170" y1="618" x2="170" y2="664" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- INGESTION label -->
<text font-size="10" fill="#aaaaaa" x="170" y="654" text-anchor="middle">INGESTION PIPELINE</text>

