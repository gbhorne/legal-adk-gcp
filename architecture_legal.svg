<text font-size="10" fill="#aaaaaa" x="170" y="462" text-anchor="middle">RETRIEVAL</text>
<text font-size="10" fill="#aaaaaa" x="510" y="462" text-anchor="middle">GENERATION</text>

<!-- Vertex AI Search -->
<rect x="38" y="468" width="264" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#633806" x="170" y="488" text-anchor="middle">Vertex AI Search</text>
<text font-size="10" fill="#854F0B" x="170" y="504" text-anchor="middle">1,010+ Georgia court opinions (2024-2025)</text>
<text font-size="10" fill="#854F0B" x="170" y="518" text-anchor="middle">datastore: legal-search-shared  |  location: us</text>

<!-- Gemini -->
<rect x="378" y="468" width="264" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#27500A" x="510" y="488" text-anchor="middle">Gemini 2.5 Flash</text>
<text font-size="10" fill="#3B6D11" x="510" y="504" text-anchor="middle">clause analysis  |  risk rating  |  drafting</text>
<text font-size="10" fill="#3B6D11" x="510" y="518" text-anchor="middle">Google AI Studio API  |  GOOGLE_GENAI_USE_VERTEXAI=false</text>

<!-- Context arrow -->
<line x1="302" y1="496" x2="376" y2="496" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
<text font-size="9" fill="#888888" x="339" y="490" text-anchor="middle">grounded context</text>

<!-- GCS arrow -->
<line x1="170" y1="524" x2="170" y2="572" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

