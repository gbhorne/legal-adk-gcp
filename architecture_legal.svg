<rect x="38" y="660" width="264" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#444441" x="170" y="680" text-anchor="middle">CourtListener REST API</text>
<text font-size="10" fill="#5F5E5A" x="170" y="696" text-anchor="middle">9M+ opinions  |  471 jurisdictions  |  free token</text>
<text font-size="10" fill="#5F5E5A" x="170" y="710" text-anchor="middle">nightly sync via Cloud Scheduler + Cloud Run Job</text>

<!-- Secret Manager -->
<rect x="378" y="660" width="264" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#444441" x="510" y="680" text-anchor="middle">Secret Manager</text>
<text font-size="10" fill="#5F5E5A" x="510" y="696" text-anchor="middle">courtlistener-token  |  API keys</text>
<text font-size="10" fill="#5F5E5A" x="510" y="710" text-anchor="middle">project: legal-adk  |  location: us-central1</text>

