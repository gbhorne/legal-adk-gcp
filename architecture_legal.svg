<text font-size="11" fill="#888888" x="340" y="44" text-anchor="middle">Google ADK 1.28 | Vertex AI Search | Gemini 2.5 Flash | Cloud DLP | FastAPI | Cloud Run</text>

<!-- ENTRY POINTS label -->
<text font-size="10" fill="#aaaaaa" x="340" y="64" text-anchor="middle">ENTRY POINTS</text>

<!-- ADK Web UI -->
<rect x="58" y="70" width="164" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="140" y="90" text-anchor="middle">ADK web UI</text>
<text font-size="10" fill="#534AB7" x="140" y="107" text-anchor="middle">localhost:8000</text>

<!-- FastAPI -->
<rect x="258" y="70" width="164" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="340" y="90" text-anchor="middle">FastAPI</text>
<text font-size="10" fill="#534AB7" x="340" y="107" text-anchor="middle">/review  /research  /draft</text>

<!-- Cloud Run -->
<rect x="458" y="70" width="164" height="46" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#3C3489" x="540" y="90" text-anchor="middle">Cloud Run</text>
<text font-size="10" fill="#534AB7" x="540" y="107" text-anchor="middle">production container</text>

<!-- Arrows to orchestrator -->
<line x1="140" y1="116" x2="240" y2="168" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="340" y1="116" x2="340" y2="168" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="540" y1="116" x2="440" y2="168" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ORCHESTRATOR label -->
<text font-size="10" fill="#aaaaaa" x="340" y="158" text-anchor="middle">ADK ORCHESTRATOR</text>

<!-- Orchestrator box -->
<rect x="118" y="164" width="444" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#085041" x="340" y="184" text-anchor="middle">legal_orchestrator  (root_agent)</text>
<text font-size="10" fill="#0F6E56" x="340" y="200" text-anchor="middle">routes by intent: review / research / draft  |  sub_agents = [ReviewAgent, DraftAgent, ResearchAgent]</text>

<!-- Arrows to agents -->
<line x1="220" y1="214" x2="148" y2="268" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="340" y1="214" x2="340" y2="268" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="460" y1="214" x2="532" y2="268" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- AGENTS label -->
<text font-size="10" fill="#aaaaaa" x="340" y="258" text-anchor="middle">SPECIALIST AGENTS (ADK Agent + FunctionTool)</text>

<!-- review_agent -->
<rect x="38" y="264" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#0C447C" x="138" y="284" text-anchor="middle">review_agent</text>
<text font-size="10" fill="#185FA5" x="138" y="300" text-anchor="middle">tool: analyze_contract()</text>
<text font-size="10" fill="#185FA5" x="138" y="314" text-anchor="middle">returns: ContractRiskReport</text>

<!-- research_agent -->
<rect x="240" y="264" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#0C447C" x="340" y="284" text-anchor="middle">research_agent</text>
<text font-size="10" fill="#185FA5" x="340" y="300" text-anchor="middle">tool: legal_research()</text>
<text font-size="10" fill="#185FA5" x="340" y="314" text-anchor="middle">returns: LegalResearchMemo</text>

<!-- draft_agent -->
<rect x="442" y="264" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#0C447C" x="542" y="284" text-anchor="middle">draft_agent</text>
<text font-size="10" fill="#185FA5" x="542" y="300" text-anchor="middle">tool: draft_document()</text>
<text font-size="10" fill="#185FA5" x="542" y="314" text-anchor="middle">returns: DraftedDocument</text>

<!-- Arrows to DLP -->
<line x1="138" y1="320" x2="220" y2="374" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
