<rect x="118" y="370" width="444" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text font-size="13" font-weight="bold" fill="#712B13" x="340" y="390" text-anchor="middle">Cloud DLP tokenizer</text>
<text font-size="10" fill="#993C1D" x="340" y="406" text-anchor="middle">replaces PII with reversible tokens before every LLM call  |  detokenizes on output  |  ABA Rule 1.6</text>

<!-- Arrows from DLP -->
<line x1="250" y1="420" x2="192" y2="472" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="430" y1="420" x2="488" y2="472" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

